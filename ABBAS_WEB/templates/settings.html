{% extends "base.html" %}

{% block content %}
<div class="row g-3">
  <div class="col-12 col-xl-6">
    <div class="card shadow-sm h-100">
      <div class="card-header bg-white fw-semibold"><i class="bi bi-sliders me-2"></i>시스템 설정</div>
      <div class="card-body">
        <div class="form-check form-switch">
          <input class="form-check-input" type="checkbox" role="switch" id="settingAutoRefresh" checked>
          <label class="form-check-label" for="settingAutoRefresh">자동 새로고침</label>
          <div class="small text-secondary">상태 화면에서 자동 갱신(향후 적용)</div>
        </div>

        <hr>

        <label class="form-label">기본 조회 범위</label>
        <select class="form-select">
          <option>최근 1시간</option>
          <option selected>최근 24시간</option>
          <option>최근 7일</option>
        </select>

        <div class="mt-3">
          <label class="form-label">시간대</label>
          <select class="form-select">
            <option selected>서울</option>
            <option>협정세계시</option>
          </select>
        </div>
      </div>
    </div>
  </div>

  <div class="col-12 col-xl-6">
    <div class="card shadow-sm h-100">
      <div class="card-header bg-white fw-semibold"><i class="bi bi-shield-lock me-2"></i>관리자 콘솔 설정</div>
      <div class="card-body">
        <div class="form-check form-switch">
          <input class="form-check-input" type="checkbox" role="switch" id="settingCompactSidebar">
          <label class="form-check-label" for="settingCompactSidebar">사이드바 축소 모드</label>
          <div class="small text-secondary">화면 옵션(향후 적용)</div>
        </div>

        <hr>

        <label class="form-label">로그 표시 형식</label>
        <select class="form-select">
          <option selected>간단</option>
          <option>상세</option>
        </select>

        <div class="mt-3">
          <label class="form-label">테마</label>
          <select class="form-select">
            <option selected>기본</option>
            <option>어두움(향후)</option>
          </select>
        </div>

        <div class="mt-4 d-flex justify-content-end">
          <button id="btnSaveSettings" type="button" class="btn btn-primary">
            <i class="bi bi-save me-1"></i>저장(화면)
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 저장 완료 토스트 -->
<div class="toast-container position-fixed bottom-0 end-0 p-3">
  <div id="saveToast" class="toast" role="alert" aria-live="assertive" aria-atomic="true">
    <div class="toast-header">
      <i class="bi bi-check-circle text-success me-2"></i>
      <strong class="me-auto">설정</strong>
      <small class="text-secondary">방금</small>
      <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="닫기"></button>
    </div>
    <div class="toast-body">
      저장되었습니다(화면만).
    </div>
  </div>
</div>
{% endblock %}
