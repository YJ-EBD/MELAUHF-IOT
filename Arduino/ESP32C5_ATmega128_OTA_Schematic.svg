<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="920" viewBox="0 0 1400 920">
  <defs>
    <style>
      .title { font: 700 28px Arial, sans-serif; fill: #10233f; }
      .subtitle { font: 600 16px Arial, sans-serif; fill: #35506f; }
      .label { font: 600 16px Arial, sans-serif; fill: #17324d; }
      .text { font: 14px Arial, sans-serif; fill: #18324b; }
      .small { font: 12px Arial, sans-serif; fill: #36516a; }
      .chip { fill: #f7fbff; stroke: #2d4d6c; stroke-width: 2; rx: 14; ry: 14; }
      .sd { fill: #fff9f1; stroke: #8a5a1f; stroke-width: 2; rx: 14; ry: 14; }
      .note { fill: #f2f8f2; stroke: #4f7b4f; stroke-width: 1.5; rx: 12; ry: 12; }
      .wire { stroke: #315d87; stroke-width: 3; fill: none; }
      .wire2 { stroke: #7b4a19; stroke-width: 3; fill: none; }
      .gnd { stroke: #4e6277; stroke-width: 2; fill: none; }
      .part { fill: #ffffff; stroke: #56738e; stroke-width: 1.5; rx: 8; ry: 8; }
      .part2 { fill: #ffffff; stroke: #7b4a19; stroke-width: 1.5; rx: 8; ry: 8; }
      .dot { fill: #315d87; }
    </style>
  </defs>

  <text x="40" y="50" class="title">ESP32-C5 -> ATmega128 OTA / ISP Schematic</text>
  <text x="40" y="80" class="subtitle">Current code pin map based on ABBAS_ESPbyMELAUHF.ino</text>

  <rect x="40" y="120" width="360" height="560" class="chip"/>
  <text x="60" y="155" class="label">ESP32-C5</text>
  <text x="60" y="190" class="text">GPIO12 : SPI SCK</text>
  <text x="60" y="225" class="text">GPIO11 : SPI MOSI</text>
  <text x="60" y="260" class="text">GPIO9  : SPI MISO input</text>
  <text x="60" y="295" class="text">GPIO10 : SD CS</text>
  <text x="60" y="330" class="text">GPIO24 : ATmega RESET control</text>
  <text x="60" y="365" class="text">GPIO5  : UART TX -> ATmega RXD0</text>
  <text x="60" y="400" class="text">GPIO4  : UART RX <- ATmega TXD0</text>
  <text x="60" y="435" class="text">GPIO6  : DWIN RX</text>
  <text x="60" y="470" class="text">GPIO7  : DWIN TX</text>
  <text x="60" y="505" class="text">3.3V   : ESP / SD supply</text>
  <text x="60" y="540" class="text">GND    : Common ground</text>
  <text x="60" y="600" class="small">Existing SPI pins are reused for ATmega ISP.</text>
  <text x="60" y="622" class="small">Only RESET control is added on a new GPIO.</text>

  <rect x="980" y="120" width="360" height="560" class="chip"/>
  <text x="1000" y="155" class="label">ATmega128 Target</text>
  <text x="1000" y="190" class="text">ISP SCK</text>
  <text x="1000" y="225" class="text">ISP MOSI</text>
  <text x="1000" y="260" class="text">ISP MISO</text>
  <text x="1000" y="295" class="text">RESET</text>
  <text x="1000" y="330" class="text">RXD0</text>
  <text x="1000" y="365" class="text">TXD0</text>
  <text x="1000" y="400" class="text">VCC = 5V</text>
  <text x="1000" y="435" class="text">GND</text>
  <text x="1000" y="490" class="small">ISP Header (recommended)</text>
  <text x="1000" y="515" class="small">1 MISO  2 VCC</text>
  <text x="1000" y="537" class="small">3 SCK   4 MOSI</text>
  <text x="1000" y="559" class="small">5 RESET 6 GND</text>

  <rect x="520" y="150" width="120" height="40" class="part"/>
  <text x="550" y="175" class="text">10k</text>
  <rect x="520" y="210" width="120" height="40" class="part"/>
  <text x="550" y="235" class="text">20k</text>
  <rect x="490" y="315" width="170" height="42" class="part"/>
  <text x="545" y="341" class="text">2.2k</text>
  <rect x="700" y="300" width="120" height="120" class="part"/>
  <text x="735" y="340" class="label">2N3904</text>
  <text x="720" y="370" class="small">B</text>
  <text x="780" y="370" class="small">C</text>
  <text x="750" y="405" class="small">E</text>
  <rect x="850" y="275" width="95" height="42" class="part"/>
  <text x="883" y="301" class="text">10k</text>
  <rect x="850" y="335" width="95" height="42" class="part"/>
  <text x="873" y="361" class="small">100k opt.</text>

  <rect x="520" y="720" width="310" height="150" class="sd"/>
  <text x="540" y="755" class="label">SD Card Module</text>
  <text x="540" y="790" class="text">CS   <- GPIO10</text>
  <text x="540" y="818" class="text">MOSI <- GPIO11</text>
  <text x="540" y="846" class="text">SCK  <- GPIO12</text>
  <text x="540" y="874" class="text">MISO -> GPIO9</text>

  <path d="M400 190 H980" class="wire"/>
  <text x="660" y="182" class="small">GPIO12 -> ISP SCK</text>

  <path d="M400 225 H980" class="wire"/>
  <text x="652" y="217" class="small">GPIO11 -> ISP MOSI</text>

  <path d="M980 260 H640" class="wire"/>
  <path d="M520 170 H400 V260" class="wire"/>
  <path d="M640 170 V260" class="wire"/>
  <path d="M580 250 V278" class="wire"/>
  <circle cx="580" cy="260" r="5" class="dot"/>
  <path d="M580 250 H580" class="wire"/>
  <path d="M580 250 H580" class="wire"/>
  <path d="M580 250 V210" class="wire"/>
  <path d="M580 250 V278" class="wire"/>
  <path d="M580 250 H640" class="wire"/>
  <path d="M580 250 H520" class="wire"/>
  <path d="M580 250 V210" class="wire"/>
  <path d="M580 250 V278" class="wire"/>
  <path d="M580 250 V300" class="wire"/>
  <path d="M580 250 H580" class="wire"/>
  <path d="M580 278 H400" class="wire"/>
  <text x="507" y="288" class="small">Divider node ~3.3V</text>

  <path d="M580 250 V210" class="wire"/>
  <path d="M580 250 V290" class="wire"/>
  <path d="M580 250 H580" class="wire"/>
  <path d="M580 250 V278" class="wire"/>
  <path d="M580 250 V210" class="wire"/>
  <path d="M580 250 V278" class="wire"/>
  <path d="M580 250 V210" class="wire"/>
  <path d="M580 250 V278" class="wire"/>
  <path d="M580 250 H580" class="wire"/>

  <path d="M580 250 V270" class="wire"/>
  <path d="M580 250 H580" class="wire"/>
  <path d="M580 250 V272" class="wire"/>
  <path d="M580 250 H580" class="wire"/>
  <path d="M580 250 V275" class="wire"/>
  <path d="M580 275 V410" class="wire"/>
  <path d="M580 410 H560" class="gnd"/>
  <path d="M560 410 H600" class="gnd"/>
  <path d="M565 418 H595" class="gnd"/>
  <path d="M570 426 H590" class="gnd"/>

  <path d="M400 330 H490" class="wire"/>
  <path d="M660 336 H700" class="wire"/>
  <text x="544" y="309" class="small">GPIO24 -> RESET driver</text>

  <path d="M820 360 H980" class="wire"/>
  <text x="846" y="352" class="small">Collector -> RESET</text>

  <path d="M760 420 V455" class="gnd"/>
  <path d="M740 455 H780" class="gnd"/>
  <path d="M745 463 H775" class="gnd"/>
  <path d="M750 471 H770" class="gnd"/>

  <path d="M945 296 H980" class="wire"/>
  <text x="840" y="266" class="small">RESET pull-up to +5V</text>
  <path d="M898 275 V245" class="wire"/>
  <path d="M878 245 H918" class="wire"/>
  <text x="866" y="238" class="small">+5V</text>

  <path d="M898 377 V430" class="gnd"/>
  <path d="M878 430 H918" class="gnd"/>
  <path d="M883 438 H913" class="gnd"/>
  <path d="M888 446 H908" class="gnd"/>

  <path d="M400 365 H980" class="wire"/>
  <text x="654" y="357" class="small">GPIO5 -> RXD0</text>

  <path d="M980 365 H400" class="wire"/>
  <text x="653" y="387" class="small">TXD0 -> GPIO4</text>

  <path d="M400 540 H980" class="gnd"/>
  <text x="650" y="532" class="small">Common GND</text>

  <path d="M400 295 H520" class="wire2"/>
  <path d="M400 225 V818 H520" class="wire2"/>
  <path d="M400 190 V846 H520" class="wire2"/>
  <path d="M400 260 V874 H520" class="wire2"/>
  <text x="392" y="684" class="small" transform="rotate(90 392 684)">Shared SPI bus to SD</text>

  <rect x="930" y="720" width="360" height="150" class="note"/>
  <text x="950" y="752" class="label">Build Notes</text>
  <text x="950" y="784" class="text">1. Keep SD CS high during ATmega ISP.</text>
  <text x="950" y="812" class="text">2. Best stability: no SD access while flashing.</text>
  <text x="950" y="840" class="text">3. MISO must be level shifted down to 3.3V.</text>

  <rect x="40" y="720" width="420" height="150" class="note"/>
  <text x="60" y="752" class="label">Recommended Sequence</text>
  <text x="60" y="784" class="text">OTA download -> SD idle -> RESET low -> ISP write -> verify -> RESET release</text>
  <text x="60" y="812" class="text">Existing UART on GPIO4/5 stays available outside programming window.</text>
  <text x="60" y="840" class="text">DWIN lines on GPIO6/7 are unchanged.</text>
</svg>
